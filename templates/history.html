<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"><title>我的足迹</title>
    {% if static_mode == 'local_only' %}
    <link href="/static/lib/bootstrap.min.css" rel="stylesheet">
    {% else %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          onerror="this.onerror=null;this.href='/static/lib/bootstrap.min.css';">
    {% endif %}
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 800px;">
        <h4 class="mb-4 fw-bold">👣 访问足迹</h4>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light"><tr><th>文件名</th><th>IP地址</th><th>时间</th></tr></thead>
                <tbody>
                    {% for h in history %}
                    <tr>
                        <td class="text-primary fw-bold">{{ h.filename }}</td>
                        <td><code class="small">{{ h.ip }}</code></td>
                        <td class="text-muted">{{ h.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a href="/" class="btn btn-primary mt-3 rounded-pill px-4">返回主页</a>
    </div>
</body>
</html>
