<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 李敖研究网</title>
    {% if static_mode == 'local_only' %}
    <link href="/static/lib/bootstrap.min.css" rel="stylesheet">
    {% else %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          onerror="this.onerror=null;this.href='/static/lib/bootstrap.min.css';">
    {% endif %}
    <style>
        /* 1. 网页背景纹理 (延续李敖研究网风格) */
        body {
            background-color: #f2f2f2;
            background-image: radial-gradient(#ffffff 1.5px, transparent 0), radial-gradient(rgba(0,0,0,0.08) 1.5px, transparent 0);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 2. 主卡片设计 */
        .card {
            width: 100%;
            max-width: 400px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: #fff;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
        }

        /* 顶部装饰条 */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #b71c1c; /* 李敖红 */
            z-index: 1;
        }

        .btn-danger { background-color: #b71c1c; border: none; padding: 10px; transition: 0.3s; }
        .btn-danger:hover { background-color: #a31919; transform: translateY(-1px); }

        /* 3. 注册区域样式 */
        .reg-section {
            display: none; /* 默认隐藏 */
            margin-top: 25px;
            background-color: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            animation: fadeInDown 0.4s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reg-header {
            font-size: 0.9rem;
            font-weight: bold;
            color: #b71c1c;
            margin-bottom: 15px;
            border-left: 3px solid #b71c1c;
            padding-left: 10px;
        }

        .form-control-sm { margin-bottom: 12px; }

        /* 4. 二维码适配 */
        .qr-code {
            max-width: 100%;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h3 class="text-center fw-bold mb-4" style="color:#333;">李敖研究网</h3>

    {% if error %}
    <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="用户名" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="密码" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 mb-3 fw-bold">登 录</button>
    </form>

    <div class="d-flex justify-content-between align-items-center">
        <button class="btn btn-sm btn-outline-secondary" onclick="toggleRegistration()" style="font-size:0.8rem">注册账号</button>
        <a href="#" class="text-muted small text-decoration-none" style="font-size:0.8rem" data-bs-toggle="modal" data-bs-target="#forgetModal">找回密码?</a>
    </div>

    <div id="regArea" class="reg-section">
        <div class="reg-header">新用户注册</div>
        <form action="/register" method="POST" id="regForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input name="username" class="form-control form-control-sm" placeholder="设置用户名" required>
            <input type="password" name="password" class="form-control form-control-sm" placeholder="设置密码" required>
            <input type="email" name="email" class="form-control form-control-sm" placeholder="填写常用邮箱" required>
            <button type="submit" class="btn btn-sm btn-dark w-100 mt-2 fw-bold">立即加入</button>
        </form>
    </div>
</div>

<div class="modal fade" id="forgetModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">找回密码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center p-4">
                <p class="text-secondary mb-4 small">请扫描下方二维码联系管理员进行身份确认及重置</p>
                <div class="qr-container">
                    <img src="https://tw.leeao.net:62048/f/Q3Hz/WH.jpg" alt="管理员二维码" class="qr-code">
                </div>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

{% if static_mode == 'local_only' %}
<script src="/static/lib/bootstrap.bundle.min.js"></script>
{% else %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        onerror="this.onerror=null;this.src='/static/lib/bootstrap.bundle.min.js';"></script>
{% endif %}
<script>
    // 切换注册框显示/隐藏
    function toggleRegistration() {
        const regArea = document.getElementById('regArea');
        const isHidden = regArea.style.display === 'none' || regArea.style.display === '';

        regArea.style.display = isHidden ? 'block' : 'none';

        if (isHidden) {
            regArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    // 提交前的简单邮箱格式检查
    document.getElementById('regForm').onsubmit = function(e) {
        const emailInput = this.querySelector('input[name="email"]');
        if (!emailInput.value.includes('@')) {
            alert('❌ 请输入有效的电子邮箱地址');
            e.preventDefault();
            return false;
        }
    };
</script>
</body>
</html>
