<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>注册</title>
{% if static_mode == 'local_only' %}
<link href="/static/lib/bootstrap.min.css" rel="stylesheet"></head>
{% else %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
      onerror="this.onerror=null;this.href='/static/lib/bootstrap.min.css';"></head>
{% endif %}
<body class="bg-light d-flex align-items-center justify-content-center" style="height:100vh;">
    <form class="bg-white p-5 rounded-4 shadow-sm" style="width:400px;" method="POST">
        <h4 class="mb-4 text-center fw-bold text-primary">加入 Cloud Space</h4>
        <input type="text" name="username" class="form-control mb-3 py-2 bg-light border-0" placeholder="用户名" required>
        <input type="email" name="email" class="form-control mb-3 py-2 bg-light border-0" placeholder="电子邮箱" required>
        <input type="password" name="password" class="form-control mb-4 py-2 bg-light border-0" placeholder="设置密码" required>
        <button class="btn btn-primary w-100 py-2 shadow-sm">立即创建账户</button>
        <div class="text-center mt-3"><a href="/login" class="small text-muted text-decoration-none">已有账号？返回登录</a></div>
    </form>
</body>
</html>
