<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李敖研究网 - leeao.net</title>
    <link rel="icon" href="/static/Meihua_ROC.svg.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>
<nav class="navbar navbar-dark mb-3">
    <div class="container-fluid d-flex align-items-center justify-content-between flex-nowrap">
        <div class="nav-left d-flex align-items-center">
            <a class="navbar-brand fw-bold d-flex align-items-center me-2" href="/">
                <img src="/static/Meihua_ROC.svg.png" alt="Logo">
                <span>李敖研究网</span>
            </a>
            <a href="https://tw.leeao.net:51025" class="btn-old-ver">旧版</a>
            <button class="btn-theme-toggle" onclick="toggleTheme()">模式</button>
            <span class="disclaimer-text">永久免费 禁止倒卖</span>
        </div>
        <div class="nav-right d-flex align-items-center text-white">
            <div class="dropdown history-dropdown me-2">
                <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown">记录</button>
                <ul class="dropdown-menu dropdown-menu-end" id="historyList"></ul>
            </div>
            <div class="me-2 text-end d-flex flex-column justify-content-center">
                <div id="uName" class="fw-bold">...</div>
            </div>
            <img id="uAvatar" src="" class="rounded-circle user-avatar" onclick="showAvatarModal()">
        </div>
    </div>
</nav>

<div class="container">
    <div class="breadcrumb-container">
        <nav aria-label="breadcrumb" style="flex: 1; min-width: 0;">
            <ol class="breadcrumb" id="pathNav"></ol>
        </nav>
        <button class="btn btn-sm btn-outline-secondary" onclick="toggleLayout()" id="layoutBtn">切换网格</button>
    </div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="fileSearch" placeholder="🔍 搜索文件..." onkeydown="if(event.keyCode==13) executeSearch()">
            <button id="searchBtn" onclick="executeSearch()">搜索</button>
        </div>
        <button class="btn-fav-toggle" data-bs-toggle="offcanvas" data-bs-target="#favDrawer" onclick="syncFavs()">
            ⭐ <span>我的收藏</span>
        </button>
    </div>

    <div id="fileContainer" class="file-list"></div>

    <div class="pagination-container" id="pager" style="display:none;">
        <button class="btn-page" id="prevBtn" onclick="changePage(-1)">上一页</button>
        <div class="page-jump">
            <input type="number" id="jumpInput" min="1" placeholder="页码">
            <button class="btn-jump" onclick="jumpToPage()">跳转</button>
        </div>
        <button class="btn-page" id="nextBtn" onclick="changePage(1)">下一页</button>
        <span class="page-info" id="pageLabel"></span>
    </div>

    <div class="chat-section mt-4 mb-5">
        <div class="chat-card">
            <div class="chat-header p-3 fw-bold text-danger">学术交流讨论区</div>
            <div id="chatBox"></div>
            <div class="chat-footer p-3">
                <div class="input-group">
                    <input type="text" id="msgInput" class="form-control" placeholder="撰写讨论见解..." onkeydown="if(event.keyCode==13) sendMsg()">
                    <button class="btn btn-dark" onclick="sendMsg()" id="sendBtn">发表</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-end" id="favDrawer" tabindex="-1">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title">⭐ 我的收藏</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0" id="favContent"></div>
</div>

<div class="modal fade" id="playModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark">
            <div class="p-2 text-end"><button type="button" class="btn-close btn-close-white" onclick="closeVideo()"></button></div>
            <div id="videoWrap"></div>
            <div id="resumeTip" class="video-resume-tip">已恢复上次播放进度</div>
            <div class="p-3 d-flex justify-content-center gap-1">
                <button class="btn btn-xs btn-outline-light" onclick="setSpeed(0.5, event)">0.5x</button>
                <button class="btn btn-xs btn-outline-light active" onclick="setSpeed(1.0, event)">1x</button>
                <button class="btn btn-xs btn-outline-light" onclick="setSpeed(1.5, event)">1.5x</button>
                <button class="btn btn-xs btn-outline-light" onclick="setSpeed(2.0, event)">2x</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pdfModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title" id="pdfTitle">文献预览</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <iframe id="pdfFrame" style="width:100%; height:80vh; border:none;" src=""></iframe>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="avatarModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">用户信息</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <p>关联 <b>Gravatar</b> 头像。</p>
                <p class="text-danger small fw-bold">本站已关闭自助修改功能。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary w-100" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
