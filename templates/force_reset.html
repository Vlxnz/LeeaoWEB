<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强制修改密码 - 李敖研究网</title>
    {% if static_mode == 'local_only' %}
    <link href="/static/lib/bootstrap.min.css" rel="stylesheet">
    {% else %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          onerror="this.onerror=null;this.href='/static/lib/bootstrap.min.css';">
    {% endif %}
    <style>
        body {
            background: #f2f2f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .card-box {
            width: 100%;
            max-width: 430px;
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
<div class="card-box">
    <h4 class="mb-3">请先修改密码</h4>
    <p class="text-muted small mb-3">为了账号安全，首次登录或管理员要求后必须修改密码。</p>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/force_reset">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
            <input type="password" name="old_password" class="form-control" placeholder="当前密码" required>
        </div>
        <div class="mb-3">
            <input type="password" name="new_password" class="form-control" placeholder="新密码(需含大小写字母和数字)" required>
        </div>
        <div class="mb-3">
            <input type="password" name="confirm_password" class="form-control" placeholder="确认新密码" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">保存并进入系统</button>
    </form>
    <div class="mt-3 text-center">
        <a href="/logout" class="text-muted small">退出登录</a>
    </div>
</div>
{% if static_mode == 'local_only' %}
<script src="/static/lib/bootstrap.bundle.min.js"></script>
{% else %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        onerror="this.onerror=null;this.src='/static/lib/bootstrap.bundle.min.js';"></script>
{% endif %}
</body>
</html>
